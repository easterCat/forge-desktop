<div class="section-header"><h2>Software Detection</h2><span class="count" id="softwareCount">12 apps</span></div>
<div class="tab-bar"><div class="tab-item active" onclick="filterSoftwareTab('all',this)">All</div><div class="tab-item" onclick="filterSoftwareTab('detected',this)">Detected</div><div class="tab-item" onclick="filterSoftwareTab('not-found',this)">Not Found</div></div>
<div class="filter-bar">
  <div class="search-input"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9A9A" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search software…" id="softwareSearch" aria-label="Search software" oninput="debouncedFilterSoftware()"><div class="clear-btn" onclick="document.getElementById('softwareSearch').value='';filterSoftware()"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#9A9A9A" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg></div></div>
  <select class="filter-select" id="softwareTierFilter" onchange="filterSoftware()">
    <option value="all">All Tiers</option>
    <option value="t0">Tier 0 · AI Tools</option>
    <option value="t1">Tier 1 · Foundation</option>
    <option value="t2">Tier 2 · Language Mgr</option>
    <option value="t3">Tier 3 · Runtime</option>
    <option value="t4">Tier 4 · Debug</option>
    <option value="t5">Tier 5 · Productivity</option>
  </select>
  <select class="filter-select" id="softwarePlatformFilter" onchange="filterSoftware()">
    <option value="auto">Auto detect</option>
    <option value="macos">macOS</option>
    <option value="windows">Windows</option>
    <option value="linux">Linux</option>
    <option value="cross">Cross-platform</option>
  </select>
  <select class="filter-select" id="softwareStatusFilter" onchange="filterSoftware()">
    <option value="all">All Status</option>
    <option value="detected">Detected</option>
    <option value="not-found">Not Found</option>
  </select>
</div>
<div class="card-grid" id="softwareList"></div>
