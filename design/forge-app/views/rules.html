<div class="section-header"><h2>Rules</h2><span class="count" id="rulesCount">10 files</span></div>
<div class="filter-bar">
  <div class="search-input"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9A9A" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search rules…" id="rulesSearch" aria-label="Search rules" oninput="debouncedFilterRules()"><div class="clear-btn" onclick="document.getElementById('rulesSearch').value='';filterRules()"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#9A9A9A" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg></div></div>
  <select class="filter-select" id="rulesTypeFilter" onchange="filterRules()">
    <option value="all">All Types</option>
    <option value="md">Markdown (.md)</option>
    <option value="mdc">MDC (.mdc)</option>
  </select>
  <select class="filter-select" id="rulesStatusFilter" onchange="filterRules()">
    <option value="all">All Status</option>
    <option value="active">Active</option>
    <option value="inactive">Inactive</option>
  </select>
  <select class="filter-select" id="rulesSoftwareFilter" onchange="filterRules()">
    <option value="all">All Software</option>
    <option value="Cursor">Cursor</option>
    <option value="Claude Desktop">Claude Desktop</option>
  </select>
  <button class="btn btn-primary btn-sm" onclick="openModal('createRuleModal')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Create Rule</button>
</div>
<div class="card-grid" id="rulesList"></div>
