<div class="section-header"><h2>Import / Export</h2></div>
<div class="settings-grid">
  <div class="setting-group">
    <h4>Export Configuration</h4>
    <p style="font-size:13px;color:var(--fg-muted);margin-bottom:12px">Package your configs as a portable .forge file</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-muted);cursor:pointer"><input type="checkbox" checked> Cursor configs</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-muted);cursor:pointer"><input type="checkbox" checked> Claude Desktop configs</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-muted);cursor:pointer"><input type="checkbox"> Windsurf configs</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-muted);cursor:pointer"><input type="checkbox"> CLI tool configs</label>
    </div>
    <button class="btn btn-primary" style="margin-top:16px;width:100%">Export as .forge</button>
  </div>
  <div class="setting-group">
    <h4>Import Configuration</h4>
    <p style="font-size:13px;color:var(--fg-muted);margin-bottom:12px">Import configs from a .forge package or Git repo</p>
    <div style="border:2px dashed rgba(255,255,255,0.32);border-radius:var(--radius);padding:40px 20px;text-align:center;margin-bottom:12px;background:rgba(255,255,255,0.30);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--fg-ghost)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div style="font-size:13px;color:var(--fg-muted)">Drop .forge file here or <span style="color:var(--accent);cursor:pointer;font-weight:600">browse</span></div>
    </div>
    <button class="btn btn-secondary" style="width:100%">Import from Git Repository</button>
  </div>
</div>
