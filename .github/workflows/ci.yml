name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when the same branch pushes again. Saves CI minutes
# when iterating on a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Skip Rust incremental caches that don't help CI much but bloat the
  # cache volume over time.
  CARGO_INCREMENTAL: 0

jobs:
  # -----------------------------------------------------------------
  # Frontend: typecheck + lint + unit tests. This runs first because
  # it's cheap (~1 min) and catches the bulk of regressions.
  # -----------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      # Lint is allowed to fail without blocking the build: the project
      # has a backlog of pre-existing style violations. New code in PRs
      # is expected to pass `lint:diff` (a follow-up could gate on that).
      - name: Lint (advisory)
        run: pnpm lint || true
        continue-on-error: true

      - name: Format check (advisory)
        run: pnpm format:check || true
        continue-on-error: true

      - name: Unit tests
        run: pnpm test

  # -----------------------------------------------------------------
  # Coverage: runs the same Vitest suite with `--coverage` so the v8
  # provider produces an lcov report and a text summary. The report is
  # uploaded as a workflow artifact (always) and pushed to Codecov when
  # a `CODECOV_TOKEN` secret is configured (best-effort — the job does
  # not fail if the token is missing).
  #
  # This is decoupled from the `frontend` job so a coverage failure
  # (e.g. a threshold regression) doesn't break the gate. A future
  # tightening can move thresholds into the gate.
  # -----------------------------------------------------------------
  coverage:
    name: Coverage (lcov + Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        # Override the project's coverage thresholds to 0 so CI never fails
        # on the (still-low) current coverage. Local runs still enforce
        # the real thresholds via `npm run test:coverage`. When overall
        # coverage climbs above the configured thresholds, the override
        # can be removed.
        run: pnpm vitest run --coverage --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-${{ github.sha }}
          path: coverage/lcov.info
          retention-days: 14
          if-no-files-found: warn

      - name: Upload to Codecov
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # -----------------------------------------------------------------
  # Backend: cargo build + test. Tauri is multi-platform so we only
  # need a single Linux runner; cross-platform build issues are picked
  # up by release workflow.
  # -----------------------------------------------------------------
  backend:
    name: Backend (cargo build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy (advisory)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings || true
        continue-on-error: true

      - name: cargo build
        working-directory: src-tauri
        run: cargo build --verbose

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --verbose --lib

  # -----------------------------------------------------------------
  # Aggregate: only required when both above pass. Provides the
  # single status check that branch protection can gate on.
  # -----------------------------------------------------------------
  ci-success:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: success()
    steps:
      - name: Mark success
        run: echo "All checks passed"