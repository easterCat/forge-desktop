<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- OpenCode Icon - OP -->
  <defs>
    <linearGradient id="opencodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Brand color circle background -->
  <circle cx="24" cy="24" r="22" fill="#111113" opacity="0.9"/>
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#opencodeGrad)" stroke-width="2"/>
  <!-- Initials "OP" -->
  <text x="24" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#8B5CF6">OP</text>
</svg>
