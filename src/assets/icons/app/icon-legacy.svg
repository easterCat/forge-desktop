<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: void black to carbon -->
    <linearGradient id="legacyBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111113"/>
      <stop offset="100%" style="stop-color:#0A0A0B"/>
    </linearGradient>

    <!-- Amber glow -->
    <radialGradient id="legacyGlow" cx="25%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>

    <!-- Symbol gradient -->
    <linearGradient id="legacySymbolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#legacyBgGrad)"/>

  <!-- Ambient glow -->
  <rect width="512" height="512" rx="96" fill="url(#legacyGlow)"/>

  <!-- Simplified Bold "F" - occupies ~70% of canvas for 32px visibility -->
  <g transform="translate(256, 256)">
    <!-- Top bar - 320px wide (main visual anchor) -->
    <rect x="-160" y="-140" width="320" height="50" rx="8" fill="url(#legacySymbolGrad)"/>

    <!-- Middle bar - 250px wide -->
    <rect x="-125" y="-50" width="250" height="40" rx="6" fill="url(#legacySymbolGrad)"/>

    <!-- Lower bar - 175px wide -->
    <rect x="-87" y="30" width="175" height="30" rx="5" fill="url(#legacySymbolGrad)"/>

    <!-- Vertical stem -->
    <rect x="-160" y="-140" width="45" height="200" rx="8" fill="url(#legacySymbolGrad)"/>

    <!-- Cursor accent -->
    <g fill="#0A0A0B" transform="translate(110, -115)">
      <path d="M0,0 L25,15 L0,30 Z"/>
    </g>

    <!-- Sparks for energy -->
    <circle cx="168" cy="-115" r="8" fill="#FBBF24"/>
    <circle cx="140" cy="-115" r="5" fill="#FBBF24" opacity="0.7"/>
    <circle cx="168" cy="-30" r="6" fill="#FBBF24" opacity="0.8"/>
  </g>

  <!-- Corner accents -->
  <g fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <path d="M90,100 L90,80 L110,80"/>
    <path d="M422,412 L422,432 L402,432"/>
  </g>
</svg>
