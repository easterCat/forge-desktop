<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge</title>
    <!-- Audit 1.4: pre-load the entry chunk and the global stylesheet so the
         browser starts fetching them in parallel with /src/main.ts instead of
         waiting for the JS to discover them via dynamic import. -->
    <link rel="modulepreload" href="/src/main.ts" />
    <link rel="preload" as="style" href="/src/assets/main.css" />
    <link rel="stylesheet" href="/src/assets/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
